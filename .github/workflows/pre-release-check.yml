name: Pre-Release Check

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./internal/vue/tests/... -v -count=1

      - name: Verify binaries build
        run: |
          echo "Testing binary builds..."
          GOOS=linux GOARCH=amd64 go build -o /tmp/tsgo-linux ./thirdparty/typescript-go/cmd/tsgo
          GOOS=darwin GOARCH=arm64 go build -o /tmp/tsgo-darwin ./thirdparty/typescript-go/cmd/tsgo
          GOOS=windows GOARCH=amd64 go build -o /tmp/tsgo.exe ./thirdparty/typescript-go/cmd/tsgo
          echo "All binaries build successfully"

      - name: Verify secrets are set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          ERRORS=0

          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN secret is not set"
            ERRORS=$((ERRORS + 1))
          else
            echo "NPM_TOKEN is set"
          fi

          if [ -z "$VSCE_TOKEN" ]; then
            echo "VSCE_TOKEN secret is not set"
            ERRORS=$((ERRORS + 1))
          else
            echo "VSCE_TOKEN is set"
          fi

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Missing secrets. Release will fail!"
            echo "Set secrets at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          echo ""
          echo "All checks passed! Release can proceed."
