name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vue test dependencies
        shell: bash
        run: |
          set -e
          for dir in internal/vue/tests/vue-3.2 internal/vue/tests/vue-3.3 internal/vue/tests/vue-3.4 internal/vue/tests/vue-3.5 internal/vue/tests/vue-3.6; do
            echo "Installing $dir..."
            (cd "$dir" && npm install --no-package-lock)
            ls "$dir/node_modules/vue/package.json"
          done

      - name: Run tests
        run: go test ./internal/vue/tests/... -v -count=1

  build:
    name: Build Binary
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o ./build/tsgo${{ matrix.goos == 'windows' && '.exe' || '' }} ./thirdparty/typescript-go/cmd/tsgo

      - name: Test binary
        if: matrix.goos == runner.os
        run: ./build/tsgo${{ matrix.goos == 'windows' && '.exe' || '' }} --version

  extension:
    name: Build VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build binary for extension
        env:
          CGO_ENABLED: '0'
        run: go build -o editors/vscode/lib/tsgo ./thirdparty/typescript-go/cmd/tsgo

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Build extension
        working-directory: editors/vscode
        run: npm run build

      - name: Bundle extension
        working-directory: editors/vscode
        run: npm run bundle

      - name: Package VSIX
        working-directory: editors/vscode
        run: npx @vscode/vsce package --no-dependencies

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run go vet
        run: go vet ./internal/... ./cmd/... ./tools/... ./plugin/...

      - name: Run go fmt check
        run: |
          UNFORMATTED=$(gofmt -l . | grep -v '^thirdparty/' || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "Go code is not formatted:"
            echo "$UNFORMATTED"
            gofmt -d $(echo "$UNFORMATTED")
            exit 1
          fi

  status-check:
    name: Status Check
    if: always()
    needs: [test, build, extension, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.extension.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
