name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please provide as much detail as possible.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm before submitting
      options:
        - label: I have searched existing feature requests to avoid duplicates
          required: true
        - label: I have checked the TODO.md roadmap
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area does this feature relate to?
      options:
        - Vue language feature (new directive, API, etc.)
        - Type checking accuracy
        - Performance improvement
        - CLI feature
        - VS Code extension feature
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / Use Case
      description: What problem would this feature solve? Why do you need it?
      placeholder: "I'm frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Provide examples if possible.
      placeholder: |
        ```vue
        <!-- Example of how the feature would be used -->
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other solutions or workarounds have you considered?

  - type: dropdown
    id: volar
    attributes:
      label: Volar Compatibility
      description: Does Volar (vue-tsc) support this feature?
      options:
        - "Yes - Volar supports this"
        - "No - This is a new idea"
        - "Unknown"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or examples
