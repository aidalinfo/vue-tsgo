name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      description: Please confirm before submitting
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I am using the latest version of vue-tsgo
          required: true
        - label: I have read the documentation
          required: false

  - type: input
    id: version
    attributes:
      label: vue-tsgo Version
      description: Output of `vue-tsgo --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: What platform are you using?
      options:
        - CLI (command line)
        - VS Code Extension
        - Both
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Node version (if using extension), Go version (if building from source)"
      placeholder: "macOS 14.2, Node 20.10, Go 1.25"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Provide a minimal Vue SFC that reproduces the issue.
        **Tip**: Use a code fence with \`\`\`vue
      placeholder: |
        ```vue
        <script setup lang="ts">
        // Your code here
        </script>
        <template>
          <!-- Your template here -->
        </template>
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages, screenshots, etc.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      description: |
        If applicable, add full error messages or stack traces.
        **Tip**: Use a code fence with \`\`\`
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Critical (blocks all usage)
        - High (blocks major functionality)
        - Medium (inconvenient but has workaround)
        - Low (minor issue)
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (related issues, attempted solutions, etc.)
